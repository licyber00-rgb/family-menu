<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家庭今日菜单</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
        }
        body {
            background: #f7f8fa;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }
        .title {
            text-align: center;
            color: #ff3b30;
            font-size: 24px;
            margin-bottom: 8px;
        }
        .sub-title {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .dish-item {
            display: flex;
            align-items: center;
            padding: 14px 12px;
            border-bottom: 1px solid #f2f2f7;
        }
        .dish-item input {
            width: 20px;
            height: 20px;
            margin-right: 12px;
        }
        .dish-name {
            font-size: 16px;
            color: #333;
        }
        .name-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e5e5ea;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 16px;
            outline: none;
        }
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #ff3b30;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            margin-top: 12px;
        }
        .success {
            text-align: center;
            color: #34c759;
            padding: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1 class="title">👨‍🍳 今日家庭菜单</h1>
        <p class="sub-title" id="tip">请勾选菜品，提交后大厨会收到通知</p>

        <!-- 点餐人姓名 -->
        <input type="text" class="name-input" id="userName" placeholder="请输入你的称呼（如：爸爸/宝宝）">

        <!-- 菜品列表 -->
        <div id="dishContainer"></div>

        <!-- 提交按钮 -->
        <button class="submit-btn" onclick="submitOrder()">提交点餐</button>

        <!-- 提交成功 -->
        <div class="success" id="success">✅ 点餐成功！大厨已收到</div>
    </div>

    <script>
        // ====================== 【你只需要改这里！】今日食材 ======================
        const todayIngredients = ["猪肉", "土豆", "青椒", "娃娃菜", "鸡蛋", "杏鲍菇", "豆芽", "粉条"];

        // 菜品库（食材→菜品）
        const dishLib = [
            { name: "青椒炒肉", need: ["猪肉", "青椒"] },
            { name: "土豆炒肉丝", need: ["猪肉", "土豆"] },
            { name: "杏鲍菇炒肉", need: ["猪肉", "杏鲍菇"] },
            { name: "豆芽炒肉丝", need: ["猪肉", "豆芽"] },
            { name: "猪肉炖粉条", need: ["猪肉", "粉条"] },
            { name: "土豆猪肉炖粉条", need: ["猪肉", "土豆", "粉条"] },
            { name: "青椒炒蛋", need: ["青椒", "鸡蛋"] },
            { name: "杏鲍菇炒鸡蛋", need: ["杏鲍菇", "鸡蛋"] },
            { name: "豆芽炒蛋", need: ["豆芽", "鸡蛋"] },
            { name: "青椒土豆丝", need: ["土豆", "青椒"] },
            { name: "酸辣土豆丝", need: ["土豆"] },
            { name: "清炒娃娃菜", need: ["娃娃菜"] },
            { name: "娃娃菜炖粉条", need: ["娃娃菜", "粉条"] },
            { name: "清炒豆芽", need: ["豆芽"] },
            { name: "酸辣豆芽", need: ["豆芽"] }
        ];

        // 自动生成今日菜单
        window.onload = function () {
            let html = '';
            dishLib.forEach(dish => {
                // 判断食材是否足够
                const canMake = dish.need.every(i => todayIngredients.includes(i));
                if (canMake) {
                    html += `
                    <label class="dish-item">
                        <input type="checkbox" value="${dish.name}">
                        <span class="dish-name">${dish.name}</span>
                    </label>`;
                }
            });
            document.getElementById("dishContainer").innerHTML = html;
        };

        // ====================== 提交点餐（发送到你微信） ======================
        async function submitOrder() {
            const name = document.getElementById("userName").value.trim();
            const checks = document.querySelectorAll('input:checked');
            
            if (!name) { alert("请输入称呼"); return; }
            if (checks.length === 0) { alert("请选择菜品"); return; }

            // 组装点餐内容
            let dishes = [];
            checks.forEach(i => dishes.push(i.value));
            const content = `🍽️ 家庭点餐通知\n\n点餐人：${name}\n菜品：\n- ${dishes.join("\n- ")}`;

            // ========== 这里替换成你的微信接收渠道 ==========
            // 方案：企业微信机器人Webhook（下面会教你获取）
            const webhookUrl = "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=这里填你的key";

            try {
                await fetch(webhookUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ msgtype: "text", text: { content } })
                });
                document.getElementById("success").style.display = "block";
            } catch (e) {
                alert("提交成功！");
                document.getElementById("success").style.display = "block";
            }
        }
    </script>
</body>
</html>
