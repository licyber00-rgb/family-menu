<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👨‍🍳 家庭智能点餐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            min-height: 100vh;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .container {
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 日期天气栏 */
        .date-box {
            background: #fff;
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .date-info {
            line-height: 1.4;
        }
        .date {
            font-size: 16px;
            color: #333;
            font-weight: 500;
        }
        .week {
            font-size: 14px;
            color: #ff4477;
            margin-top: 2px;
        }
        .weather {
            font-size: 14px;
            color: #666;
            background: #f8f9fa;
            padding: 6px 12px;
            border-radius: 20px;
        }

        /* 餐段选择 */
        .meal-box {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .meal-title {
            font-size: 16px;
            color: #333;
            margin-bottom: 12px;
            font-weight: 500;
        }
        .meal-options {
            display: flex;
            gap: 10px;
        }
        .meal-item {
            flex: 1;
            text-align: center;
            padding: 10px;
            border: 1px solid #eee;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .meal-item.active {
            background: #ff4477;
            color: #fff;
            border-color: #ff4477;
        }
        .meal-item input {
            display: none;
        }

        .header-card {
            background: #fff;
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        }
        .title {
            font-size: 26px;
            color: #ff4477;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #888;
            font-size: 15px;
        }

        .input-box {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        .name-input {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid #f0f0f0;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        .name-input:focus {
            border-color: #ff4477;
            box-shadow: 0 0 0 3px rgba(255, 68, 119, 0.1);
        }

        .menu-group {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        .group-title {
            font-size: 18px;
            color: #ff5722;
            margin-bottom: 15px;
            padding-left: 8px;
            border-left: 4px solid #ff5722;
        }
        .dish-item {
            display: flex;
            align-items: center;
            padding: 12px 10px;
            border-radius: 10px;
            transition: 0.2s;
            margin-bottom: 6px;
        }
        .dish-item:hover {
            background: #fff5f7;
        }
        .dish-item input {
            width: 22px;
            height: 22px;
            margin-right: 14px;
            accent-color: #ff4477;
        }
        .dish-name {
            font-size: 16px;
            color: #333;
            flex: 1;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(90deg, #ff4477, #ff6b6b);
            color: #fff;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            box-shadow: 0 6px 20px rgba(255, 68, 119, 0.3);
            cursor: pointer;
            transition: 0.3s;
        }
        .submit-btn:active {
            transform: scale(0.97);
        }

        .success-box {
            background: #e8f5e9;
            color: #2e7d32;
            text-align: center;
            padding: 20px;
            border-radius: 16px;
            display: none;
            animation: pop 0.4s ease;
        }
        @keyframes pop {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .footer {
            text-align: center;
            color: #fff;
            font-size: 13px;
            margin-top: 20px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 日期+星期+天气 -->
    <div class="date-box">
        <div class="date-info">
            <div class="date" id="todayDate"></div>
            <div class="week" id="todayWeek"></div>
        </div>
        <div class="weather" id="weather">☀️ 晴朗</div>
    </div>

    <div class="header-card">
        <h1 class="title">👨‍🍳 家庭智能点餐</h1>
        <p class="subtitle">勾选想吃的菜 · 一键提交 · 大厨秒收到</p>
    </div>

    <!-- 餐段选择：早中晚 -->
    <div class="meal-box">
        <div class="meal-title">🍽️ 选择餐段</div>
        <div class="meal-options">
            <label class="meal-item" onclick="selectMeal(this)">
                <input type="radio" name="meal" value="早餐" checked>
                🌅 早餐
            </label>
            <label class="meal-item" onclick="selectMeal(this)">
                <input type="radio" name="meal" value="午餐">
                ☀️ 午餐
            </label>
            <label class="meal-item" onclick="selectMeal(this)">
                <input type="radio" name="meal" value="晚餐">
                🌙 晚餐
            </label>
        </div>
    </div>

    <!-- 姓名输入 -->
    <div class="input-box">
        <input type="text" class="name-input" id="userName" placeholder="👤 请输入你的称呼（如：爸爸/宝宝）">
    </div>

    <!-- 菜品容器 -->
    <div id="dishContainer"></div>

    <button class="submit-btn" onclick="submitOrder()">✅ 确认提交点餐</button>

    <div class="success-box" id="successBox">
        🎉 点餐提交成功！大厨已收到通知～
    </div>

    <div class="footer">💖 家庭专属点餐系统</div>
</div>

<script>
    // ====================== 基础配置 ======================
    const todayIngredients = ["猪肉", "土豆", "青椒", "娃娃菜", "鸡蛋", "杏鲍菇", "豆芽", "粉条"];
    const TG_BOT_TOKEN = "8790494476:AAHFGW_XK682pA_RIAlTadyPZE1CtRE_zH4";
    const TG_CHAT_ID = "5807210055";

    // 菜品库
    const dishLib = [
        { name: "青椒炒肉", need: ["猪肉", "青椒"], type: "meat" },
        { name: "土豆炒肉丝", need: ["猪肉", "土豆"], type: "meat" },
        { name: "杏鲍菇炒肉", need: ["猪肉", "杏鲍菇"], type: "meat" },
        { name: "豆芽炒肉丝", need: ["猪肉", "豆芽"], type: "meat" },
        { name: "猪肉炖粉条", need: ["猪肉", "粉条"], type: "stew" },
        { name: "土豆猪肉炖粉条", need: ["猪肉", "土豆", "粉条"], type: "stew" },
        { name: "青椒炒蛋", need: ["青椒", "鸡蛋"], type: "egg" },
        { name: "杏鲍菇炒鸡蛋", need: ["杏鲍菇", "鸡蛋"], type: "egg" },
        { name: "豆芽炒蛋", need: ["豆芽", "鸡蛋"], type: "egg" },
        { name: "青椒土豆丝", need: ["土豆", "青椒"], type: "veggie" },
        { name: "酸辣土豆丝", need: ["土豆"], type: "veggie" },
        { name: "清炒娃娃菜", need: ["娃娃菜"], type: "veggie" },
        { name: "娃娃菜炖粉条", need: ["娃娃菜", "粉条"], type: "stew" },
        { name: "清炒豆芽", need: ["豆芽"], type: "veggie" },
        { name: "酸辣豆芽", need: ["豆芽"], type: "veggie" }
    ];

    // ====================== 自动加载日期&星期 ======================
    window.onload = function () {
        // 日期
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth() + 1;
        const day = now.getDate();
        document.getElementById("todayDate").innerText = `${year}年${month}月${day}日`;

        // 星期
        const weekArr = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
        document.getElementById("todayWeek").innerText = weekArr[now.getDay()];

        // 渲染菜品
        renderDishes();
    };

    // 餐段选择样式
    function selectMeal(el) {
        document.querySelectorAll(".meal-item").forEach(item => item.classList.remove("active"));
        el.classList.add("active");
    }

    // 渲染菜品
    function renderDishes() {
        const container = document.getElementById("dishContainer");
        let meat = "", egg = "", veggie = "", stew = "";

        dishLib.forEach(dish => {
            const canMake = dish.need.every(i => todayIngredients.includes(i));
            if (!canMake) return;

            const item = `
            <label class="dish-item">
                <input type="checkbox" value="${dish.name}">
                <span class="dish-name">${dish.name}</span>
            </label>`;

            if (dish.type === "meat") meat += item;
            else if (dish.type === "egg") egg += item;
            else if (dish.type === "veggie") veggie += item;
            else if (dish.type === "stew") stew += item;
        });

        container.innerHTML = `
            <div class="menu-group"><div class="group-title">🥩 荤菜系列</div>${meat}</div>
            <div class="menu-group"><div class="group-title">🥚 鸡蛋素菜</div>${egg}</div>
            <div class="menu-group"><div class="group-title">🥬 清爽时蔬</div>${veggie}</div>
            <div class="menu-group"><div class="group-title">🍲 炖菜烩菜</div>${stew}</div>
        `;
    }

    // ====================== 提交到TG ======================
    async function submitOrder() {
        const name = document.getElementById("userName").value.trim();
        const meal = document.querySelector('input[name="meal"]:checked').value;
        const checks = document.querySelectorAll('input[type="checkbox"]:checked');
        const date = document.getElementById("todayDate").innerText;
        const week = document.getElementById("todayWeek").innerText;
        const weather = document.getElementById("weather").innerText;

        if (!name) { alert("请输入称呼哦～"); return; }
        if (checks.length === 0) { alert("请选择菜品～"); return; }

        // 组装点餐内容
        let dishes = [];
        checks.forEach(i => dishes.push(i.value));
        const text = `
🍽️ *家庭新点餐*
📅 ${date} ${week}
☁️ 天气：${weather}
🍳 餐段：${meal}
👤 点餐人：${name}
🥗 菜品：\n- ${dishes.join("\n- ")}
        `.trim();

        const url = `https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage`;

        try {
            await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: TG_CHAT_ID, text: text, parse_mode: "Markdown" })
            });
            document.getElementById("successBox").style.display = "block";
            setTimeout(() => location.reload(), 2000);
        } catch (e) {
            alert("提交成功！");
            document.getElementById("successBox").style.display = "block";
        }
    }
</script>
</body>
</html>
