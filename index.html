<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👨‍🍳 家庭智能点餐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            transition: background 0.3s, color 0.3s;
        }

        :root {
            --bg: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            --card: #fff;
            --text: #333;
            --sub: #888;
            --main: #ff4477;
            --light: #fff5f7;
            --border: #f0f0f0;
        }

        [data-theme="dark"] {
            --bg: #1a1a1a;
            --card: #2a2a2a;
            --text: #eee;
            --sub: #aaa;
            --main: #ff6b9d;
            --light: #3a2c30;
            --border: #444;
        }

        body {
            background: var(--bg);
            min-height: 100vh;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            color: var(--text);
        }

        .container {
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 顶部栏 */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .dark-btn {
            background: var(--card);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: var(--text);
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        /* 日期天气 */
        .date-box {
            background: var(--card);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .date-info { line-height: 1.4; }
        .date { font-size: 16px; font-weight: 500; }
        .week { font-size: 14px; color: var(--main); margin-top: 2px; }
        .weather { font-size: 14px; background: var(--light); padding: 6px 12px; border-radius: 20px; }

        /* 头部 */
        .header-card {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-bottom: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }
        .title { font-size: 26px; color: var(--main); font-weight: bold; margin-bottom: 6px; }
        .subtitle { color: var(--sub); font-size: 15px; }

        /* 餐段 */
        .meal-box {
            background: var(--card);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .meal-title { font-size: 16px; margin-bottom: 10px; font-weight: 500; }
        .meal-options { display: flex; gap: 8px; }
        .meal-item {
            flex: 1; text-align: center; padding: 10px;
            border: 1px solid var(--border); border-radius: 12px; cursor: pointer;
        }
        .meal-item.active { background: var(--main); color: #fff; border-color: var(--main); }
        .meal-item input { display: none; }

        /* 人数 */
        .people-box {
            background: var(--card);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .people-select {
            display: flex; gap: 8px;
        }
        .people-item {
            width: 40px; height: 40px; border-radius: 10px;
            border: 1px solid var(--border); background: var(--card);
            cursor: pointer; font-size: 16px;
        }
        .people-item.active { background: var(--main); color: #fff; border-color: var(--main); }

        /* 姓名 */
        .input-box {
            background: var(--card);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .name-input, .remark-input {
            width: 100%; padding: 12px 16px;
            border: 1px solid var(--border); border-radius: 12px;
            font-size: 16px; outline: none; background: var(--card); color: var(--text);
            margin-bottom: 10px;
        }
        .remark-input { height: 60px; resize: none; }

        /* 菜品 */
        .menu-group {
            background: var(--card);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .group-title {
            font-size: 18px; color: #ff5722;
            margin-bottom: 12px; padding-left: 8px; border-left: 4px solid #ff5722;
        }
        .dish-item {
            display: flex; align-items: center;
            padding: 10px; border-radius: 10px;
            margin-bottom: 8px; border: 1px solid transparent;
        }
        .dish-item:hover { background: var(--light); }
        .dish-item.disabled { opacity: 0.5; pointer-events: none; }
        .dish-name { flex: 1; font-size: 16px; }
        .tag {
            font-size: 12px; padding: 2px 6px; border-radius: 4px;
            margin-right: 6px; color: #fff;
        }
        .tag.hot { background: #ff4444; }
        .tag.light { background: #4fc3f7; }
        .tag.reco { background: #ff9800; }
        .num-box {
            display: flex; align-items: center; gap: 6px;
        }
        .num-btn {
            width: 26px; height: 26px; border-radius: 6px;
            border: none; background: var(--light); color: var(--text);
            font-weight: bold; cursor: pointer;
        }
        .num { width: 24px; text-align: center; font-size: 15px; }

        /* 按钮 */
        .action-row {
            display: flex; gap: 10px; margin-bottom: 12px;
        }
        .clear-btn {
            flex: 1; padding: 14px; border-radius: 14px;
            border: 1px solid var(--border); background: var(--card);
            font-size: 16px; cursor: pointer;
        }
        .submit-btn {
            flex: 2; padding: 14px; border-radius: 14px;
            background: linear-gradient(90deg, var(--main), #ff6b6b);
            color: #fff; border: none; font-size: 17px; font-weight: bold;
            box-shadow: 0 6px 20px rgba(255, 68, 119, 0.3);
            cursor: pointer;
        }
        .submit-btn:active { transform: scale(0.97); }

        /* 成功 */
        .success-box {
            background: #e8f5e9; color: #2e7d32;
            text-align: center; padding: 16px; border-radius: 16px;
            display: none; animation: pop 0.4s ease;
        }
        @keyframes pop {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .footer {
            text-align: center; color: var(--sub);
            font-size: 13px; margin-top: 16px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <div></div>
        <button class="dark-btn" id="darkBtn">🌙</button>
    </div>

    <div class="date-box">
        <div class="date-info">
            <div class="date" id="todayDate"></div>
            <div class="week" id="todayWeek"></div>
        </div>
        <div class="weather" id="weather">☀️ 晴朗</div>
    </div>

    <div class="header-card">
        <h1 class="title">👨‍🍳 家庭智能点餐</h1>
        <p class="subtitle">选餐段·填人数·勾选菜品·一键通知大厨</p>
    </div>

    <div class="meal-box">
        <div class="meal-title">🍽️ 选择餐段</div>
        <div class="meal-options">
            <label class="meal-item active" onclick="selectMeal(this)">
                <input type="radio" name="meal" value="早餐" checked>🌅 早餐
            </label>
            <label class="meal-item" onclick="selectMeal(this)">
                <input type="radio" name="meal" value="午餐">☀️ 午餐
            </label>
            <label class="meal-item" onclick="selectMeal(this)">
                <input type="radio" name="meal" value="晚餐">🌙 晚餐
            </label>
        </div>
    </div>

    <div class="people-box">
        <div class="meal-title">👥 就餐人数</div>
        <div class="people-select">
            <button class="people-item active" onclick="setPeople(1)">1</button>
            <button class="people-item" onclick="setPeople(2)">2</button>
            <button class="people-item" onclick="setPeople(3)">3</button>
            <button class="people-item" onclick="setPeople(4)">4</button>
            <button class="people-item" onclick="setPeople(5)">5</button>
        </div>
    </div>

    <div class="input-box">
        <input type="text" class="name-input" id="userName" placeholder="👤 你的称呼（爸爸/宝宝）">
        <textarea class="remark-input" id="remark" placeholder="📝 备注：少盐/不辣/多醋/忌口等"></textarea>
    </div>

    <div id="dishContainer"></div>

    <div class="action-row">
        <button class="clear-btn" onclick="clearAll()">🔄 清空所选</button>
        <button class="submit-btn" onclick="submitOrder()">✅ 提交点餐</button>
    </div>

    <div class="success-box" id="successBox">🎉 提交成功！大厨已收到~</div>
    <div class="footer">💖 家庭专属点餐系统</div>
</div>

<script>
    // ====================== 配置区（你只改这里） ======================
    const todayIngredients = ["猪肉","土豆","青椒","娃娃菜","鸡蛋","杏鲍菇","豆芽","粉条"];
    const TG_BOT_TOKEN = "8790494476:AAHFGW_XK682pA_RIAlTadyPZE1CtRE_zH4";
    const TG_CHAT_ID = "5807210055";
    const soldOutDishes = ["澳洲鲍鱼"]; // 售罄菜品，例：["青椒炒肉"]

    // 菜品库 + 标签
    const dishLib = [
        { name:"青椒炒肉", need:["猪肉","青椒"], type:"meat", tag:"hot" },
        { name:"土豆炒肉丝", need:["猪肉","土豆"], type:"meat", tag:"reco" },
        { name:"杏鲍菇炒肉", need:["猪肉","杏鲍菇"], type:"meat", tag:"light" },
        { name:"豆芽炒肉丝", need:["猪肉","豆芽"], type:"meat", tag:"hot" },
        { name:"猪肉炖粉条", need:["猪肉","粉条"], type:"stew", tag:"reco" },
        { name:"土豆猪肉炖粉条", need:["猪肉","土豆","粉条"], type:"stew", tag:"reco" },
        { name:"青椒炒蛋", need:["青椒","鸡蛋"], type:"egg", tag:"light" },
        { name:"杏鲍菇炒鸡蛋", need:["杏鲍菇","鸡蛋"], type:"egg", tag:"light" },
        { name:"豆芽炒蛋", need:["豆芽","鸡蛋"], type:"egg", tag:"light" },
        { name:"青椒土豆丝", need:["土豆","青椒"], type:"veggie", tag:"light" },
        { name:"酸辣土豆丝", need:["土豆"], type:"veggie", tag:"hot" },
        { name:"清炒娃娃菜", need:["娃娃菜"], type:"veggie", tag:"light" },
        { name:"娃娃菜炖粉条", need:["娃娃菜","粉条"], type:"stew", tag:"light" },
        { name:"清炒豆芽", need:["豆芽"], type:"veggie", tag:"light" },
        { name:"酸辣豆芽", need:["豆芽"], type:"veggie", tag:"hot" }
    ];

    // 全局变量
    let people = 1;
    let dishNums = {};

    // 初始化
    window.onload = () => {
        // 日期
        const now = new Date();
        document.getElementById("todayDate").innerText = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
        const week = ["周日","周一","周二","周三","周四","周五","周六"];
        document.getElementById("todayWeek").innerText = week[now.getDay()];
        // 渲染菜品
        renderDishes();
        // 深色模式
        document.getElementById("darkBtn").onclick = () => {
            const isDark = document.body.dataset.theme === "dark";
            document.body.dataset.theme = isDark ? "" : "dark";
            document.getElementById("darkBtn").innerText = isDark ? "🌙" : "☀️";
        };
    };

    // 餐段选择
    function selectMeal(el) {
        document.querySelectorAll(".meal-item").forEach(i=>i.classList.remove("active"));
        el.classList.add("active");
    }

    // 就餐人数
    function setPeople(num) {
        people = num;
        document.querySelectorAll(".people-item").forEach(i=>i.classList.remove("active"));
        event.target.classList.add("active");
    }

    // 份数增减（最小值改为0）
    function changeNum(name, num) {
        dishNums[name] = Math.max(0, Math.min(3, (dishNums[name]||0)+num));
        document.querySelector(`[data-dish="${name}"] .num`).innerText = dishNums[name];
    }

    // 渲染菜品（默认份数0）
    function renderDishes() {
        const ctn = document.getElementById("dishContainer");
        let meat="", egg="", veggie="", stew="";
        const tagMap = {hot:"🔥 辣", light:"🥗 清淡", reco:"⭐ 推荐"};

        dishLib.forEach(d=>{
            if(!d.need.every(i=>todayIngredients.includes(i))) return;
            const out = soldOutDishes.includes(d.name);
            dishNums[d.name] = 0; // 默认0份
            const item = `
            <div class="dish-item ${out?'disabled':''}" data-dish="${d.name}">
                <span class="dish-name">
                    ${d.tag?`<span class="tag ${d.tag}">${tagMap[d.tag]}</span>`:''}${d.name}
                </span>
                <div class="num-box">
                    <button class="num-btn" onclick="changeNum('${d.name}',-1)">-</button>
                    <span class="num">0</span> <!-- 初始显示0 -->
                    <button class="num-btn" onclick="changeNum('${d.name}',1)">+</button>
                </div>
            </div>`;
            d.type==="meat"?meat+=item:d.type==="egg"?egg+=item:d.type==="veggie"?veggie+=item:stew+=item;
        });

        ctn.innerHTML = `
            <div class="menu-group"><div class="group-title">🥩 荤菜</div>${meat}</div>
            <div class="menu-group"><div class="group-title">🥚 蛋品</div>${egg}</div>
            <div class="menu-group"><div class="group-title">🥬 素菜</div>${veggie}</div>
            <div class="menu-group"><div class="group-title">🍲 炖菜</div>${stew}</div>
        `;
    }

    // 清空
    function clearAll() {
        location.reload();
    }

    // 提交TG
    async function submitOrder() {
        const name = document.getElementById("userName").value.trim();
        const meal = document.querySelector('input[name="meal"]:checked').value;
        const remark = document.getElementById("remark").value.trim()||"无";
        const date = document.getElementById("todayDate").innerText;
        const week = document.getElementById("todayWeek").innerText;
        const weather = document.getElementById("weather").innerText;

        if(!name) return alert("请输入称呼");
        
        // 只筛选份数>0的菜品
        const validDishes = Object.entries(dishNums).filter(([k,v])=>v>0);
        if(validDishes.length===0) return alert("请选择至少一份菜品");

        // 震动+音效
        if(navigator.vibrate) navigator.vibrate(100);
        try { new Audio('https://qiniu.xx.cn/sound/pop.mp3').play(); } catch(e){}

        // 组装菜品
        let dishStr = "";
        validDishes.forEach(([k,v])=>dishStr+=`- ${k} ×${v}份\n`);

        const text = `
🍽️ *家庭新点餐*
📅 ${date} ${week}
☁️ 天气：${weather}
🍳 餐段：${meal}
👥 人数：${people}人
👤 点餐人：${name}
📝 备注：${remark}
🥗 菜品：
${dishStr}
        `.trim();

        try {
            await fetch(`https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage`,{
                method:"POST", headers:{"Content-Type":"application/json"},
                body:JSON.stringify({chat_id:TG_CHAT_ID, text, parse_mode:"Markdown"})
            });
            document.getElementById("successBox").style.display = "block";
            localStorage.setItem("lastOrder", text);
            setTimeout(()=>location.reload(), 2200);
        } catch(e) {
            alert("提交成功！");
            document.getElementById("successBox").style.display = "block";
        }
    }
</script>
</body>
</html>
